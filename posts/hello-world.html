<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Hello, world | Farshad Ghorbani</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="../assets/Farshad-Ghorbani.svg">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="../styles/style.css">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <main class="page">
    <header class="page-header">
      <a href="../index.html" class="back-link">&larr; blog</a>
      <h1>Hello, world</h1>
      <div class="theme-toggle" role="group" aria-label="Theme">
        <button type="button" data-theme="light" title="Light theme">&#9788;</button>
        <button type="button" data-theme="dark" title="Dark theme">&#9790;</button>
      </div>
    </header>

    <p class="post-date">2026-04-24</p>

    <article class="post">
      <p>
        First post. Replace this with whatever you want to write about
        &mdash; research notes, photos, ideas in progress.
      </p>
      <p>
        Each post is a plain HTML file under <code>posts/</code>. To add a
        new one, copy this file, edit it, and link to it from
        <code>index.html</code>.
      </p>
    </article>
  </main>

  <script src="../scripts/theme.js"></script>
</body>

</html>
