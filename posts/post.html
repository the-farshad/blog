<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Loading... | Farshad Ghorbani</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="../assets/Farshad-Ghorbani.svg">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="../styles/style.css">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || t === 'light' || t === 'sepia')
          document.documentElement.setAttribute('data-theme', t);
        var f = localStorage.getItem('font');
        if (f === 'vt323' || f === 'serif' || f === 'sans')
          document.documentElement.setAttribute('data-font', f);
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <main class="page">
    <header class="page-header">
      <a href="../index.html" class="back-link">&larr; blog</a>
      <h1 id="post-title">Loading...</h1>
    </header>

    <div class="reader-controls">
      <div class="seg" data-control="theme" role="group" aria-label="Theme">
        <button type="button" data-value="light" title="Light (yellow)">&#9728;</button>
        <button type="button" data-value="sepia" title="Sepia (paper)">&#9681;</button>
        <button type="button" data-value="dark"  title="Dark (ink)">&#9790;</button>
      </div>
      <div class="seg" data-control="font" role="group" aria-label="Font">
        <button type="button" data-value="vt323" title="VT323 &mdash; retro" style="font-family:'VT323',monospace">Aa</button>
        <button type="button" data-value="serif" title="Lora &mdash; serif" style="font-family:'Lora',Georgia,serif">Aa</button>
        <button type="button" data-value="sans"  title="Inter &mdash; sans-serif" style="font-family:'Inter',system-ui,sans-serif">Aa</button>
      </div>
    </div>

    <p id="post-meta" class="post-date"></p>

    <article id="post-body" class="post">
      <p>Loading post...</p>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="../scripts/theme.js"></script>
  <script src="../scripts/post.js"></script>
</body>

</html>
